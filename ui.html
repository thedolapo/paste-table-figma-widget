<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      padding: 24px;
      margin: 0;
      background: #111827;
      color: #fff;
    }
    .section {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 24px;
      margin-bottom: 24px;
    }
    .section:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    h2 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin: 0 0 4px 0;
    }
    .section-desc {
      font-size: 14px;
      color: #9ca3af;
      margin: 0 0 20px 0;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 8px;
    }
    #paste-area {
      width: 100%;
      min-height: 120px;
      margin: 0 0 16px 0;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid transparent;
      border-radius: 6px;
      outline: 1px solid rgba(255, 255, 255, 0.1);
      outline-offset: -1px;
      resize: vertical;
      transition: outline-color 0.15s, outline-width 0.15s;
    }
    #paste-area::placeholder { color: #6b7280; }
    #paste-area:focus {
      outline: 2px solid #6366f1;
      outline-offset: -2px;
    }
    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    #paste-create-btn {
      background: #6366f1;
      color: #fff;
    }
    #paste-create-btn:hover { background: #4f46e5; }
    #paste-create-btn:focus-visible {
      outline: 2px solid #6366f1;
      outline-offset: 2px;
    }
    #error {
      font-size: 14px;
      color: #f87171;
      margin: 12px 0 0 0;
      min-height: 1.2em;
    }
    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 12px;
      color: #9ca3af;
    }
    .footer a {
      color: #818cf8;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="section">
    <h2>Paste table data</h2>
    <p class="section-desc">Paste HTML, Markdown, TSV, CSV, or plain text. Data will be parsed into a table.</p>
    <label for="paste-area">Table data</label>
    <textarea id="paste-area" placeholder="Paste here (Ctrl/Cmd+V)…" autofocus></textarea>
    <p id="error"></p>
    <div class="actions">
      <button type="button" id="paste-create-btn">Paste and create table</button>
    </div>
  </div>
  <p class="footer">
    Created by Habib Ayoade ·
    <a id="coffee-link" href="https://buymeacoffee.com/ayoadehabib" target="_blank" rel="noopener noreferrer">Buy Coffee</a>
  </p>
  <script>
    function send(type, payload) {
      parent.postMessage({ pluginMessage: { type, payload } }, '*');
    }
    function showError(msg) {
      document.getElementById('error').textContent = msg || '';
    }
    var pasteArea = document.getElementById('paste-area');
    var emptyMsg = 'Paste your table data into the box above (Ctrl/Cmd+V), then click the button.';
    document.getElementById('paste-create-btn').onclick = function() {
      showError('');
      var fromTextarea = pasteArea.value.trim();
      if (fromTextarea) {
        send('import', fromTextarea);
        return;
      }
      if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText().then(function(text) {
          var value = (text && text.trim()) ? text.trim() : pasteArea.value.trim();
          if (value) send('import', value); else showError(emptyMsg);
        }).catch(function() {
          showError(emptyMsg);
        });
      } else {
        showError(emptyMsg);
      }
    };
    window.onmessage = function(e) {
      var msg = e.data && e.data.pluginMessage;
      if (msg && msg.type === 'error') showError(msg.message || 'Error');
      if (msg && msg.type === 'close') showError('');
    };
  </script>
</body>
</html>
